#cloud-config
package_update: true
package_upgrade: false

# ============================================
# 1. SYSTEM PREREQUISITES
# ============================================
write_files:
  # Enable IP forwarding and bridge networking (K8s requirement)
  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

  # Necessary kernel modules
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

  # containerd configuration with SystemdCgroup
  - path: /etc/containerd/config.toml
    content: |
      version = 2
      [plugins."io.containerd.grpc.v1.cri"]
        sandbox_image = "registry.k8s.io/pause:3.9"
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
          runtime_type = "io.containerd.runc.v2"
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
            SystemdCgroup = true

runcmd:
  # ============================================
  # 2. KERNEL MODULES
  # ============================================
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system

  # ============================================
  # 3. INSTALL CONTAINERD
  # ============================================
  - apt-get update
  - apt-get install -y containerd apt-transport-https ca-certificates curl gnupg
  - mkdir -p /etc/containerd
  # (config.toml already written above by write_files)
  - systemctl restart containerd
  - systemctl enable containerd

  # ============================================
  # 4. INSTALL KUBEADM, KUBELET, KUBECTL
  # ============================================
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' > /etc/apt/sources.list.d/kubernetes.list
  - apt-get update
  - apt-get install -y kubelet=1.29.* kubeadm=1.29.* kubectl=1.29.*
  - apt-mark hold kubelet kubeadm kubectl

  # ============================================
  # 5. DISABLE SWAP (K8s requirement)
  # ============================================
  - swapoff -a
  - sed -i '/swap/d' /etc/fstab

  # ============================================
  # 6. INITIALIZE CLUSTER
  # ============================================
  - kubeadm init --pod-network-cidr=10.244.0.0/16 --token-ttl=0 --ignore-preflight-errors=all | tee /root/kubeadm-init.log

  # Configure kubectl for root user
  - mkdir -p /root/.kube
  - cp /etc/kubernetes/admin.conf /root/.kube/config

  # Configure kubectl for ubuntu/default user
  - mkdir -p /home/ubuntu/.kube
  - cp /etc/kubernetes/admin.conf /home/ubuntu/.kube/config
  - chown -R 1000:1000 /home/ubuntu/.kube

  # ============================================
  # 7. INSTALL POD NETWORK CNI
  # ============================================
  - kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

  # ============================================
  # 8. SAVE JOIN COMMAND
  # ============================================
  - kubeadm token create --print-join-command > /root/join-command.txt
  - chmod 644 /root/join-command.txt
