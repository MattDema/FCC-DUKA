# ============================================================
# gvisor-runtimeclass.yaml — RuntimeClass for gVisor (runsc)
# ============================================================
# Rationale: gVisor interposes a user-space kernel between the
# container and the host kernel. Every syscall goes through
# gVisor's Sentry, which re-implements Linux syscall semantics
# in a memory-safe language (Go).
#
# Why gVisor over Kata Containers?
# - No nested virtualization required (critical on our Azure
#   E4ds_v4 VMs which already run KVM for OpenNebula).
# - Lighter memory footprint per sandbox (~15 MB vs ~120 MB
#   for Kata's micro-VM).
# - Same syscall-interception threat model: untrusted file
#   shards stored on edge daemons cannot exploit host kernel
#   vulnerabilities.
# - Trade-off: ~10-15% syscall overhead, acceptable for our
#   I/O-bound shard storage workload.
#
# Prerequisites (Person A must install on each worker node):
#   curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor \
#     -o /usr/share/keyrings/gvisor-archive-keyring.gpg
#   echo "deb [arch=amd64 signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] \
#     https://storage.googleapis.com/gvisor/releases release main" | \
#     sudo tee /etc/apt/sources.list.d/gvisor.list
#   sudo apt-get update && sudo apt-get install -y runsc
#   # Then configure containerd with runsc handler and restart
# ============================================================
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
# handler must match the containerd runtime name configured on the nodes
handler: runsc
